services:
  - type: web
    name: deal-hunter-ai-frontend
    env: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: deal-hunter-ai
    env: node
    buildCommand: cd backend && npm ci
    startCommand: cd backend && node src/db/add-missing-stores.js ; node src/db/seed-illinois-stores.js ; node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: ACTIVE_STORES
        value: discovery-only
      - key: SCAN_INTERVAL_MINUTES
        value: "90"
      - key: PROXY_ENABLED
        value: "false"
      - key: KEEPA_DOMAIN
        value: "1"
      - key: KEEPA_ENABLED
        value: "true"
      - key: KEEPA_CACHE_HOURS
        value: "24"
      - key: EBAY_ENABLED
        value: "true"
      - key: EBAY_CACHE_HOURS
        value: "24"

  - type: worker
    name: deal-hunter-worker
    env: node
    buildCommand: cd backend && npm ci
    startCommand: cd backend && node src/db/add-missing-stores.js ; node run-discovery-live.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PROXY_ENABLED
        value: "false"
      - key: EBAY_ENABLED
        value: "true"
      - key: EBAY_CACHE_HOURS
        value: "24"
