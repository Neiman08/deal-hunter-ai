services:
  - type: web
    name: deal-hunter-ai-frontend
    env: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: deal-hunter-ai
    env: node
    buildCommand: cd backend && npm ci
    startCommand: cd backend && node src/db/add-missing-stores.js ; node src/db/seed-illinois-stores.js ; node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001

  - type: worker
    name: deal-hunter-worker
    env: node
    buildCommand: cd backend && npm ci
    startCommand: cd backend && node src/db/add-missing-stores.js ; node run-discovery-live.js
    envVars:
      - key: NODE_ENV
        value: production
